name: Keep App Service Warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          set -euo pipefail
          url="https://internal-service-hub.azurewebsites.net/health"
          echo "Pinging ${url}"
          code=$(curl -L -sS -o /tmp/health.json -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            -H "User-Agent: github-actions-keepalive" \
            "$url")

          cat /tmp/health.json || true

          if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
            echo "Keepalive ping failed with HTTP $code"
            exit 1
          fi

          echo "Keepalive ping OK (HTTP $code)"
